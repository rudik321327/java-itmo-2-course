# .github/workflows/ci.yml
name: Java CI

on:
  push:
    branches: [ "**" ]           # реагируем на все ветки
  pull_request:                  # плюс PR‑ы
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий + вытягиваем LFS‑объекты (если есть)
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          lfs: true              # нужен, если gradle-wrapper.jar хранится в Git LFS

      # 2. Проверяем wrapper: подпись, checksum, наличие Jar
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3
        with:
          allow-no-wrapper: false  # true → пропустить отсутствие JAR‑а

      # 3. Ставим Temurin JDK 21 + включаем кеш Gradle
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle           # автоматически кеширует ~/.gradle

      # 4. Запускаем сборку (gradle/gradle-build-action выставит executable‑флаг для gradlew)
      - name: Build with Gradle
        uses: gradle/gradle-build-action@v3
        with:
          arguments: build        # можно добавить --scan, --info и т.д.
